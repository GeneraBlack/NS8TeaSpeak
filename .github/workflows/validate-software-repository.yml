name: Validate software repository

on:
    push:
        paths:
            - .gitattributes
            - .github/workflows/validate-software-repository.yml
            - imageroot/actions/**
            - imageroot/events/**
            - imageroot/systemd/**
            - imageroot/update-module.d/**
            - images/**
            - repository/**
            - scripts/build_repository_index.py
            - ui/src/assets/module_default_logo.png
            - VERSION
    pull_request:
        paths:
            - .gitattributes
            - .github/workflows/validate-software-repository.yml
            - imageroot/actions/**
            - imageroot/events/**
            - imageroot/systemd/**
            - imageroot/update-module.d/**
            - images/**
            - repository/**
            - scripts/build_repository_index.py
            - ui/src/assets/module_default_logo.png
            - VERSION
    workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate executable action scripts
        run: |
          python - <<'PY'
          import stat
          import sys
          from pathlib import Path

          missing = []
          roots = [
              Path("imageroot/actions"),
              Path("imageroot/events"),
              Path("imageroot/update-module.d"),
          ]

          for root in roots:
              if not root.exists():
                  continue
              for path in sorted(root.rglob("*")):
                  if not path.is_file() or not path.name[:2].isdigit():
                      continue
                  if not path.stat().st_mode & stat.S_IXUSR:
                      missing.append(path.as_posix())

          if missing:
              print("The following NS8 entrypoints must be executable:", file=sys.stderr)
              for path in missing:
                  print(path, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate Python action imports
        run: |
          python - <<'PY'
          import ast
          import sys
          from pathlib import Path

          missing = []
          roots = [
              Path("imageroot/actions"),
              Path("imageroot/events"),
              Path("imageroot/update-module.d"),
          ]

          for root in roots:
              if not root.exists():
                  continue
              for path in sorted(root.rglob("*")):
                  if not path.is_file() or path.suffix:
                      continue
                  source = path.read_text(encoding="utf-8")
                  if "sys." not in source:
                      continue

                  tree = ast.parse(source, filename=str(path))
                  imports_sys = False
                  for node in ast.walk(tree):
                      if isinstance(node, ast.Import):
                          imports_sys = imports_sys or any(alias.name == "sys" for alias in node.names)
                      elif isinstance(node, ast.ImportFrom) and node.module == "sys":
                          imports_sys = True

                  if not imports_sys:
                      missing.append(path.as_posix())

          if missing:
              print("The following Python entrypoints use sys without importing it:", file=sys.stderr)
              for path in missing:
                  print(path, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate systemd unit placeholders
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          allowed = {
              "TIMEZONE",
              "TCP_PORT",
              "NS8TEASPEAK_SERVICE_IMAGE",
              "NS8TEASPEAK_WEB_IMAGE",
          }
          invalid = {}
          pattern = re.compile(r"\$\{([A-Z0-9_]+)\}")

          for path in sorted(Path("imageroot/systemd/user").glob("*.service")):
              placeholders = sorted(set(pattern.findall(path.read_text(encoding="utf-8"))))
              unknown = [name for name in placeholders if name not in allowed]
              if unknown:
                  invalid[path.as_posix()] = unknown

          if invalid:
              print("The following systemd units reference unknown environment placeholders:", file=sys.stderr)
              for path, names in invalid.items():
                  print(f"{path}: {', '.join(names)}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate TeaSpeak service runtime user
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          service = Path("imageroot/systemd/user/teaspeak.service").read_text(encoding="utf-8")
          if "--user 0" not in service and "--user=0" not in service:
              print("teaspeak.service must start the container as uid 0 inside the rootless namespace so host state bind mounts stay writable.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate image names are normalized in build script
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          script = Path("build-images.sh").read_text(encoding="utf-8")
          required = [
              'repobase="${repobase,,}"',
              'reponame="${reponame,,}"',
          ]
          missing = [snippet for snippet in required if snippet not in script]

          if missing:
              print("build-images.sh must normalize image names to lowercase:", file=sys.stderr)
              for snippet in missing:
                  print(snippet, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate module authorizations include certificate access
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          script = Path("build-images.sh").read_text(encoding="utf-8")
          required = 'org.nethserver.authorizations=node:fwadm traefik@node:fulladm'
          if required not in script:
              print("build-images.sh must request traefik@node:fulladm for certificate sync.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate TeaSpeak config persistence and TLS paths
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          config_action = Path("imageroot/actions/configure-module/20configure").read_text(encoding="utf-8")
          entrypoint = Path("images/teaspeak-service/teaspeak-entrypoint.py").read_text(encoding="utf-8")
          required = [
              'database:',
              'url: "sqlite:///ts/database/TeaData.sqlite"',
              'certificate: "/ts/certs/query_certificate.pem"',
              'privatekey: "/ts/certs/query_privatekey.pem"',
              'certificate: "/ts/certs/default_certificate.pem"',
              'privatekey: "/ts/certs/default_privatekey.pem"',
          ]
          missing = [snippet for snippet in required if snippet not in config_action]
          required_entrypoint = [
              '-Pgeneral.database.url=sqlite:///ts/database/TeaData.sqlite',
              '-Pquery.ssl.certificate=/ts/certs/query_certificate.pem',
              '-Pquery.ssl.privatekey=/ts/certs/query_privatekey.pem',
              '-Pweb.ssl.certificate=/ts/certs/default_certificate.pem',
              '-Pweb.ssl.privatekey=/ts/certs/default_privatekey.pem',
              'ensure_legacy_database_link()',
          ]
          missing.extend(snippet for snippet in required_entrypoint if snippet not in entrypoint)
          if missing:
              print("configure-module must persist the database and wire TeaSpeak TLS paths explicitly.", file=sys.stderr)
              for snippet in missing:
                  print(snippet, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate TeaSpeak music runtime hooks
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          containerfile = Path("images/teaspeak-service/Containerfile").read_text(encoding="utf-8")
          required = [
              "yt-dlp/releases/latest/download/yt-dlp",
              "config_ffmpeg.ini",
              "config_youtube.ini",
              "ffmpeg_command=/ts/providers/bin/ffmpeg",
              "youtubedl_command=/ts/providers/bin/youtube-dl",
              "ln -sf /usr/bin/python3 /usr/bin/python",
              'ENTRYPOINT ["/usr/bin/python3", "/usr/local/bin/teaspeak-entrypoint.py"]',
              "exec /usr/local/bin/yt-dlp \"$@\"",
          ]
          missing = [snippet for snippet in required if snippet not in containerfile]

          if missing:
              print("The TeaSpeak service image is missing required music runtime hooks:", file=sys.stderr)
              for snippet in missing:
                  print(snippet, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate TeaSpeak music runtime bootstrap
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          entrypoint = Path("images/teaspeak-service/teaspeak-entrypoint.py").read_text(encoding="utf-8")
          required = [
              'ensure_music_runtime()',
              'process_env["PATH"] = build_runtime_path()',
              '"/ts/providers/bin"',
              'exec /usr/local/bin/yt-dlp "$@"',
              'ensure_persistent_database(state)',
              'sync_staged_certificates(state)',
          ]
          missing = [snippet for snippet in required if snippet not in entrypoint]

          if missing:
              print("The TeaSpeak entrypoint is missing required music bootstrap hooks:", file=sys.stderr)
              for snippet in missing:
                  print(snippet, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate TeaWeb nginx config
        run: |
          docker run --rm \
            -v "$PWD/images/teaspeak-web/default.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$PWD/images/teaspeak-web/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginx:1.30.1-alpine3.23-slim \
            nginx -t

      - name: Validate TeaWeb runtime patch hooks
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          containerfile = Path("images/teaspeak-web/Containerfile").read_text(encoding="utf-8")
          required = [
              "ns8TeaSpeakAutoConnect",
              'url.searchParams.set("connect_default","1");',
              'e&&e.nodeType?[$(e)]:b("<unknwon object>")',
          ]
          forbidden = ['url.searchParams.has("ca")']
          missing = [snippet for snippet in required if snippet not in containerfile]

          if missing:
              print("The TeaWeb image build is missing required runtime patch hooks:", file=sys.stderr)
              for snippet in missing:
                  print(snippet, file=sys.stderr)
              sys.exit(1)

          present_forbidden = [snippet for snippet in forbidden if snippet in containerfile]
          if present_forbidden:
              print("The TeaWeb auto-connect patch must not treat 'ca' as a certificate flag:", file=sys.stderr)
              for snippet in present_forbidden:
                  print(snippet, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate TeaSpeak certificate sync hooks
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          service_unit = Path("imageroot/systemd/user/teaspeak.service").read_text(encoding="utf-8")
          certificate_unit = Path("imageroot/systemd/user/teaspeak-certificate.service").read_text(encoding="utf-8")
          certificate_event = Path("imageroot/events/certificate-changed/50get_certificate").read_text(encoding="utf-8")

          required_service = [
              "Wants=teaspeak-certificate.service",
              "After=teaspeak-certificate.service",
              "%S/state/runtime/tls",
          ]
          missing_service = [snippet for snippet in required_service if snippet not in service_unit]
          if missing_service:
              print("teaspeak.service is missing certificate sync dependencies:", file=sys.stderr)
              for snippet in missing_service:
                  print(snippet, file=sys.stderr)
              sys.exit(1)

          required_unit = [
              "SuccessExitStatus=3",
              "runagent get-certificate",
              "runtime/tls/default_certificate.pem",
              "runtime/tls/default_privatekey.pem",
          ]
          missing_unit = [snippet for snippet in required_unit if snippet not in certificate_unit]
          if missing_unit:
              print("teaspeak-certificate.service is missing certificate fetch hooks:", file=sys.stderr)
              for snippet in missing_unit:
                  print(snippet, file=sys.stderr)
              sys.exit(1)

          required_event = [
              "certificate_event_matches",
              "teaspeak-certificate.service",
              "teaspeak.service",
          ]
          missing_event = [snippet for snippet in required_event if snippet not in certificate_event]
          if missing_event:
              print("certificate-changed event hook is incomplete:", file=sys.stderr)
              for snippet in missing_event:
                  print(snippet, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Validate repository index
        run: python scripts/build_repository_index.py --check