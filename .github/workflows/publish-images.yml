name: "Publish images"

on:
  push:
  workflow_dispatch:

permissions:
  packages: write
  actions: read
  contents: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  publish-images:
    if: github.run_number > 1
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.publish.outputs.images }}
    env:
      REPOBASE: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/cache@v5
        with:
          path: ui/node_modules
          key: "yarn-${{ hashFiles('ui/yarn.lock') }}"

      - id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGETAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          IMAGETAG=$(printf '%s' "${IMAGETAG:?}" | tr '/' '-')
          echo "IMAGETAG=${IMAGETAG}" >> "$GITHUB_ENV"

          rm -f .github-output

          docker run --rm --privileged \
            -e STORAGE_DRIVER=vfs \
            -e BUILDAH_ISOLATION=chroot \
            -e CI=1 \
            -e REPOBASE="${REPOBASE}" \
            -e IMAGETAG="${IMAGETAG}" \
            -e GITHUB_OUTPUT=/workspace/.github-output \
            -e GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -e GITHUB_ACTOR="${GITHUB_ACTOR}" \
            -v "$PWD:/workspace" \
            -w /workspace \
            quay.io/buildah/stable \
            bash -lc '
              set -euo pipefail
              bash build-images.sh

              images_line=$(cat .github-output)
              images="${images_line#images=}"
              : "${images:?}"

              trap '\''buildah logout ghcr.io'\'' EXIT
              buildah login -u "$GITHUB_ACTOR" --password-stdin ghcr.io <<<"$GITHUB_TOKEN"

              for image in $images; do
                buildah push "$image" "docker://${image}:${IMAGETAG}"
                if [[ "$IMAGETAG" == "main" || "$IMAGETAG" == "master" ]]; then
                  buildah push "$image" "docker://${image}:latest"
                fi
              done
            '

          cat .github-output >> "$GITHUB_OUTPUT"

  module:
    needs: publish-images
    uses: NethServer/ns8-github-actions/.github/workflows/module-info.yml@v1
  trivy:
    needs: module

    if: ${{ needs.module.outputs.release == 'stable' || needs.module.outputs.release == 'latest' || github.event_name == 'workflow_dispatch' }}
    uses: NethServer/ns8-github-actions/.github/workflows/scan-with-trivy.yml@v1
    with:
      images: ${{ needs.module.outputs.images }}
